name: CI

on:
  push:
    tags:
      - 'v*'
      - 'sendr-v*'
      - 'notification-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            11.0.x

      - name: Build
        run: dotnet build -c Release

      - name: Test
        run: dotnet test -c Release

      - name: Resolve package set and version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"

          case "$TAG" in
            sendr-v*)
              echo "PKG_VERSION=${TAG#sendr-v}" >> "$GITHUB_ENV"
              {
                echo "PROJECTS<<EOF"
                echo "src/Sendr.Abstractions/Sendr.Abstractions.csproj"
                echo "src/Sendr/Sendr.csproj"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            notification-v*)
              echo "PKG_VERSION=${TAG#notification-v}" >> "$GITHUB_ENV"
              {
                echo "PROJECTS<<EOF"
                echo "src/Sendr.Notification.Abstractions/Sendr.Notification.Abstractions.csproj"
                echo "src/Sendr.Notification/Sendr.Notification.csproj"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            v*)
              echo "PKG_VERSION=${TAG#v}" >> "$GITHUB_ENV"
              {
                echo "PROJECTS<<EOF"
                echo "src/Sendr.Abstractions/Sendr.Abstractions.csproj"
                echo "src/Sendr/Sendr.csproj"
                echo "src/Sendr.Notification.Abstractions/Sendr.Notification.Abstractions.csproj"
                echo "src/Sendr.Notification/Sendr.Notification.csproj"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unrecognized tag '$TAG' — expected 'v*', 'sendr-v*', or 'notification-v*'" >&2
              exit 1
              ;;
          esac

      - name: Pack
        run: |
          while IFS= read -r proj; do
            [ -z "$proj" ] && continue
            dotnet pack "$proj" -c Release -o out -p:Version="$PKG_VERSION"
          done <<< "$PROJECTS"

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: >
          dotnet nuget push "out/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
